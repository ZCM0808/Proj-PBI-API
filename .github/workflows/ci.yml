name: Proj-PBI-API CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff mypy pytest httpx

      - name: Static Analysis (Ruff & Mypy)
        run: |
          ruff check src/
          mypy src/ --ignore-missing-imports

      - name: Python Unit & API Contract Tests
        run: pytest tests/ -v

      - name: Set up Node.js for Frontend E2E
        uses: actions/setup-node@v5
        with:
          node-version: '18'

      - name: Install Node Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright UI Tests (E2E & Visual)
        run: npx playwright test

      - uses: actions/upload-artifact@v5
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
